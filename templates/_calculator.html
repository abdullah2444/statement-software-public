<!-- Calculator Widget -->
<style>
/* ── Calculator Widget ──────────────────────────────────── */
#calc-tab {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 9990;
  width: 48px;
  height: 48px;
  background: #103a46;
  color: #fff;
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 14px;
  padding: 0;
  cursor: grab;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Bahnschrift", "Trebuchet MS", "Segoe UI", sans-serif;
  box-shadow: 0 12px 28px rgba(16,58,70,.24);
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-drag: none;
  transition: background .2s, box-shadow .2s, transform .2s;
}
#calc-tab:hover {
  background: #2f6972;
  box-shadow: 0 16px 34px rgba(16,58,70,.28);
}
#calc-tab:active { cursor: grabbing; transform: scale(.98); }
#calc-tab.is-dragging {
  cursor: grabbing;
  transition: none;
}
#calc-tab svg { width: 21px; height: 21px; }
#calc-tab span {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
}

#calc-panel {
  position: fixed;
  right: 18px;
  bottom: 78px;
  width: min(380px, calc(100vw - 32px));
  max-height: min(560px, calc(100vh - 104px));
  z-index: 9990;
  background: #fff;
  border: 1px solid #d7e0e2;
  border-radius: 16px;
  box-shadow: 0 22px 60px rgba(15,23,42,.22);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px) scale(.98);
  transition: opacity .18s ease, transform .18s ease;
  font-family: "Bahnschrift", "Trebuchet MS", "Segoe UI", sans-serif;
}
#calc-panel.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

#calc-header {
  background: #fbfcfd;
  color: #132028;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 1px solid #d7e0e2;
}
#calc-header span {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .3px;
}
#calc-close {
  width: 34px;
  height: 34px;
  background: #fff;
  border: 1px solid #d7e0e2;
  border-radius: 999px;
  color: #61717c;
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
  transition: color .15s, border-color .15s, background .15s;
}
#calc-close:hover { color: #132028; border-color: #2f6972; background: #eef4f3; }

#calc-body {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

#calc-input-area {
  padding: 16px 16px 0;
  flex-shrink: 0;
}
#calc-input {
  width: 100%;
  padding: 10px 14px;
  font-size: 15px;
  font-family: inherit;
  border: 1px solid #d7e0e2;
  border-radius: 8px;
  outline: none;
  transition: border-color .2s;
  color: #132028;
}
#calc-input:focus { border-color: #2f6972; box-shadow: 0 0 0 3px rgba(47,105,114,.12); }

#calc-result-area {
  padding: 16px;
  flex-shrink: 0;
  min-height: 82px;
}
#calc-result {
  font-size: 26px;
  font-weight: 700;
  color: #132028;
  word-break: break-all;
  line-height: 1.2;
}
#calc-rate-info {
  font-size: 12px;
  color: #61717c;
  margin-top: 4px;
}
#calc-source-badge {
  display: inline-block;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 4px;
  background: #eef4f3;
  color: #334155;
  border: 1px solid #d7e0e2;
}
#calc-error {
  font-size: 13px;
  color: #c95454;
  margin-top: 4px;
}

#calc-history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 6px;
  flex-shrink: 0;
  border-top: 1px solid #edf1f2;
  padding-top: 12px;
}
#calc-history-header span {
  font-size: 12px;
  font-weight: 600;
  color: #61717c;
  text-transform: uppercase;
  letter-spacing: .5px;
}
#calc-history-clear {
  font-size: 12px;
  color: #2f6972;
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
  padding: 0;
}
#calc-history-clear:hover { text-decoration: underline; }

#calc-history-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 12px;
  min-height: 120px;
}
.calc-hist-item {
  padding: 8px 0;
  border-bottom: 1px solid #f0f3f4;
  font-size: 13px;
  color: #132028;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.calc-hist-item:last-child { border-bottom: none; }
.calc-hist-expr {
  color: #61717c;
  flex-shrink: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.calc-hist-val {
  font-weight: 600;
  white-space: nowrap;
}
</style>

<!-- Panel -->
<div id="calc-panel">
  <div id="calc-header">
    <span>Calculator</span>
    <button id="calc-close">&times;</button>
  </div>
  <div id="calc-body">
    <div id="calc-input-area">
      <input id="calc-input" type="text" placeholder="100+33 or 1 usd to eur" autocomplete="off" spellcheck="false">
    </div>
    <div id="calc-result-area">
      <div id="calc-result"></div>
      <div id="calc-rate-info"></div>

      <span>History</span>
      <button id="calc-history-clear">Clear</button>
    </div>
    <div id="calc-history-list"></div>
  </div>
</div>

<script>
(function() {
  "use strict";

  /* ── DOM refs ──────────────────────────────────────────── */
  var tab     = document.getElementById("calc-tab");
  var panel   = document.getElementById("calc-panel");
  var closeBtn= document.getElementById("calc-close");
  var input   = document.getElementById("calc-input");
  var resultEl= document.getElementById("calc-result");
  var rateEl  = document.getElementById("calc-rate-info");
  var sourceEl = document.getElementById("calc-source-badge");
  var errorEl = document.getElementById("calc-error");

  var sourceLabels = {
    "moneyconvert": "MoneyConvert (hourly)",
    "exchangerate-api": "ExchangeRate-API (daily)",
    "stored": "Stored rate (app DB)",
    "identity": ""
  };
  var histList= document.getElementById("calc-history-list");
  var clearBtn= document.getElementById("calc-history-clear");

  var HIST_KEY = "firefly_calc_history";
  var MAX_HIST = 20;
  var rateCache = {};  // keyed by pair e.g. {USDCNY: {rate:6.87, ts:Date.now()}}
  var RATE_CACHE_TTL = 3600000; // 1 hour in ms

  /* ── Currency symbols ──────────────────────────────────── */
  var symbols = {USD:'$', EUR:'\u20ac', GBP:'\u00a3', JPY:'\u00a5', CNY:'\u00a5', RMB:'\u00a5', AUD:'A$', CAD:'C$', CHF:'Fr', HKD:'HK$', SGD:'S$', KRW:'\u20a9', INR:'\u20b9', BRL:'R$', MXN:'Mex$', ZAR:'R', SEK:'kr', NOK:'kr', DKK:'kr', NZD:'NZ$', TRY:'\u20ba', THB:'\u0e3f', AED:'\u062f.\u0625', SAR:'\ufdfc', EGP:'E\u00a3'};

  /* ── Open / Close ──────────────────────────────────────── */
  function openPanel() {
    panel.classList.add("open");
    tab.style.display = "none";
    setTimeout(function(){ input.focus(); }, 180);
  }
  function closePanel() {
    panel.classList.remove("open");
    tab.style.display = "";
  }
  tab.addEventListener("click", openPanel);
  closeBtn.addEventListener("click", function() {
    closePanel();
  });

  /* ── Movable tab ───────────────────────────────────────── */
  (function enableMovableTab() {
    var POS_KEY = "firefly_calc_tab_pos";
    var dragging = false;
    var moved = false;
    var startX = 0;
    var startY = 0;
    var offsetX = 0;
    var offsetY = 0;
    var activePointerId = null;
    var activeTouchId = null;
    var hasPointerEvents = !!window.PointerEvent;
    var touchOptions = { passive: false, capture: true };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }
    function viewportWidth() {
      return window.visualViewport ? window.visualViewport.width : window.innerWidth;
    }
    function viewportHeight() {
      return window.visualViewport ? window.visualViewport.height : window.innerHeight;
    }
    function mobileViewport() {
      return viewportWidth() <= 768;
    }
    function place(x, y) {
      var rect = tab.getBoundingClientRect();
      var pad = mobileViewport() ? 16 : 8;
      var left = clamp(x, pad, viewportWidth() - rect.width - pad);
      var top = clamp(y, pad, viewportHeight() - rect.height - pad);
      tab.classList.add("is-positioned");
      tab.style.setProperty("--calc-tab-left", left + "px");
      tab.style.setProperty("--calc-tab-top", top + "px");
      tab.style.left = left + "px";
      tab.style.top = top + "px";
      tab.style.right = "auto";
      tab.style.bottom = "auto";
      tab.style.transform = "none";
      return { left: left, top: top };
    }
    function placeDefault() {
      var rect = tab.getBoundingClientRect();
      var rightPad = mobileViewport() ? 16 : 18;
      var bottomPad = mobileViewport() ? 22 : 18;
      return place(viewportWidth() - rect.width - rightPad, viewportHeight() - rect.height - bottomPad);
    }
    function save(left, top) {
      try { localStorage.setItem(POS_KEY, JSON.stringify({ left: left, top: top })); } catch(e) {}
    }
    function restore() {
      try {
        var saved = JSON.parse(localStorage.getItem(POS_KEY) || "null");
        if (saved && typeof saved.left === "number" && typeof saved.top === "number") {
          if (mobileViewport() && saved.left < 12) {
            var fallback = placeDefault();
            save(fallback.left, fallback.top);
            return;
          }
          place(saved.left, saved.top);
        }
      } catch(e) {}
    }

    restore();
    function clampSavedPosition() {
      if (!tab.classList.contains("is-positioned") || tab.style.display === "none") return;
      var rect = tab.getBoundingClientRect();
      var pos = place(rect.left, rect.top);
      save(pos.left, pos.top);
    }
    window.addEventListener("resize", clampSavedPosition);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", clampSavedPosition);

    function startDrag(clientX, clientY) {
      var rect = tab.getBoundingClientRect();
      dragging = true;
      moved = false;
      tab.classList.add("is-dragging");
      startX = clientX;
      startY = clientY;
      offsetX = clientX - rect.left;
      offsetY = clientY - rect.top;
    }
    function moveDrag(clientX, clientY) {
      if (!dragging) return;
      var distance = Math.abs(clientX - startX) + Math.abs(clientY - startY);
      if (!moved && distance <= 4) return;
      moved = true;
      var pos = place(clientX - offsetX, clientY - offsetY);
      save(pos.left, pos.top);
    }
    function blockNextClick() {
      function blockClick(e) {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        tab.removeEventListener("click", blockClick, true);
      }
      tab.addEventListener("click", blockClick, true);
      setTimeout(function() {
        tab.removeEventListener("click", blockClick, true);
      }, 500);
    }
    function stopEvent(event) {
      if (!event) return;
      if (event.cancelable) event.preventDefault();
      event.stopPropagation();
    }
    function removeMouseListeners() {
      document.removeEventListener("mousemove", onMouseMove, true);
      document.removeEventListener("mouseup", finishMouseDrag, true);
    }
    function removePointerListeners() {
      document.removeEventListener("pointermove", onPointerMove, true);
      document.removeEventListener("pointerup", finishPointerDrag, true);
      document.removeEventListener("pointercancel", finishPointerDrag, true);
    }
    function removeTouchListeners() {
      document.removeEventListener("touchmove", onTouchMove, touchOptions);
      document.removeEventListener("touchend", finishTouchDrag, touchOptions);
      document.removeEventListener("touchcancel", finishTouchDrag, touchOptions);
    }
    function endDrag(event, openOnTap) {
      if (!dragging) return;
      var didMove = moved;
      dragging = false;
      tab.classList.remove("is-dragging");
      removePointerListeners();
      removeTouchListeners();
      removeMouseListeners();
      activePointerId = null;
      activeTouchId = null;
      if (didMove) {
        stopEvent(event);
        blockNextClick();
      } else if (openOnTap) {
        stopEvent(event);
        blockNextClick();
        openPanel();
      }
    }

    function onPointerMove(event) {
      if (!dragging || event.pointerId !== activePointerId) return;
      stopEvent(event);
      moveDrag(event.clientX, event.clientY);
    }
    function finishPointerDrag(event) {
      if (!dragging || event.pointerId !== activePointerId) return;
      try { tab.releasePointerCapture(event.pointerId); } catch(e) {}
      endDrag(event, event.pointerType === "touch");
    }

    function getActiveTouch(event) {
      var lists = [event.changedTouches, event.touches];
      for (var l = 0; l < lists.length; l++) {
        var touches = lists[l];
        if (!touches) continue;
        for (var i = 0; i < touches.length; i++) {
          if (touches[i].identifier === activeTouchId) return touches[i];
        }
      }
      return null;
    }
    function onTouchMove(event) {
      var touch = getActiveTouch(event);
      if (!touch) return;
      stopEvent(event);
      moveDrag(touch.clientX, touch.clientY);
    }
    function finishTouchDrag(event) {
      var touch = getActiveTouch(event);
      if (!touch && event.type !== "touchcancel") return;
      endDrag(event, event.type !== "touchcancel");
    }

    if (hasPointerEvents) {
      tab.addEventListener("pointerdown", function(event) {
        if (event.button !== undefined && event.button !== 0) return;
        if (event.isPrimary === false) return;
        if (event.pointerType === "touch") return;
        activePointerId = event.pointerId;
        startDrag(event.clientX, event.clientY);
        try { tab.setPointerCapture(event.pointerId); } catch(e) {}
        document.addEventListener("pointermove", onPointerMove, true);
        document.addEventListener("pointerup", finishPointerDrag, true);
        document.addEventListener("pointercancel", finishPointerDrag, true);
      });
    } else {
      tab.addEventListener("mousedown", function(event) {
        if (event.button !== undefined && event.button !== 0) return;
        startDrag(event.clientX, event.clientY);
        document.addEventListener("mousemove", onMouseMove, true);
        document.addEventListener("mouseup", finishMouseDrag, true);
      });
    }
    tab.addEventListener("touchstart", function(event) {
      if (!event.touches || event.touches.length !== 1) return;
      var touch = event.touches[0];
      stopEvent(event);
      activeTouchId = touch.identifier;
      startDrag(touch.clientX, touch.clientY);
      document.addEventListener("touchmove", onTouchMove, touchOptions);
      document.addEventListener("touchend", finishTouchDrag, touchOptions);
      document.addEventListener("touchcancel", finishTouchDrag, touchOptions);
    }, touchOptions);
    tab.addEventListener("contextmenu", function(event) {
      stopEvent(event);
    });

    function onMouseMove(event) {
      if (!dragging) return;
      moveDrag(event.clientX, event.clientY);
    }
    function finishMouseDrag(event) {
      endDrag(event, false);
    }
  })();

  /* ── Safe math parser (no eval) ────────────────────────── */
  function tokenize(expr) {
    var tokens = [];
    var i = 0;
    while (i < expr.length) {
      var ch = expr[i];
      if (ch === " ") { i++; continue; }
      if ("+-*/()%".indexOf(ch) !== -1) {
        tokens.push({ type: "op", value: ch });
        i++;
      } else if (/[0-9.]/.test(ch)) {
        var num = "";
        while (i < expr.length && /[0-9.,]/.test(expr[i])) { num += expr[i]; i++; }
        var parsed = parseFloat(num.replace(/,/g, ""));
        if (isNaN(parsed)) throw new Error("Invalid number");
        tokens.push({ type: "num", value: parsed });
      } else {
        throw new Error("Unexpected character: " + ch);
      }
    }
    return tokens;
  }

  /* Recursive descent: expr -> term ((+|-) term)* */
  /* Apple-style %: in "A + B%", B% means B% of A, so A + A*B/100 */
  /* Standalone "5%" = 0.05 */
  function parseExpr(tokens, pos) {
    var result = parseTerm(tokens, pos);
    var val = result.value; pos = result.pos;
    /* Standalone %: just "5%" with no operator = 5/100 */
    if (pos < tokens.length && tokens[pos].value === "%" &&
        (pos + 1 >= tokens.length || tokens[pos + 1].value === ")")) {
      val = val / 100;
      pos++;
      return { value: val, pos: pos };
    }
    while (pos < tokens.length && (tokens[pos].value === "+" || tokens[pos].value === "-")) {
      var op = tokens[pos].value; pos++;
      result = parseTerm(tokens, pos);
      pos = result.pos;
      var rhs = result.value;
      /* Check if a % follows this term — Apple-style percentage */
      if (pos < tokens.length && tokens[pos].value === "%") {
        rhs = val * rhs / 100;
        pos++;
      }
      val = op === "+" ? val + rhs : val - rhs;
    }
    return { value: val, pos: pos };
  }
  function parseTerm(tokens, pos) {
    var result = parseUnary(tokens, pos);
    var val = result.value; pos = result.pos;
    while (pos < tokens.length && (tokens[pos].value === "*" || tokens[pos].value === "/")) {
      var op = tokens[pos].value; pos++;
      result = parseUnary(tokens, pos);
      pos = result.pos;
      /* Handle % after factor in multiply/divide: 200*5% = 200*0.05 */
      if (pos < tokens.length && tokens[pos].value === "%") {
        result.value = result.value / 100;
        pos++;
      }
      if (op === "/") {
        if (result.value === 0) throw new Error("Division by zero");
        val = val / result.value;
      } else {
        val = val * result.value;
      }
    }
    return { value: val, pos: pos };
  }
  function parseUnary(tokens, pos) {
    if (pos < tokens.length && tokens[pos].value === "-") {
      pos++;
      var result = parseFactor(tokens, pos);
      return { value: -result.value, pos: result.pos };
    }
    if (pos < tokens.length && tokens[pos].value === "+") {
      pos++;
    }
    return parseFactor(tokens, pos);
  }
  function parseFactor(tokens, pos) {
    if (pos >= tokens.length) throw new Error("Unexpected end");
    var t = tokens[pos];
    if (t.type === "num") return { value: t.value, pos: pos + 1 };
    if (t.value === "(") {
      var result = parseExpr(tokens, pos + 1);
      if (result.pos >= tokens.length || tokens[result.pos].value !== ")")
        throw new Error("Missing )");
      return { value: result.value, pos: result.pos + 1 };
    }
    throw new Error("Unexpected token");
  }

  function safeEval(expr) {
    var tokens = tokenize(expr);
    if (tokens.length === 0) throw new Error("Empty expression");
    var result = parseExpr(tokens, 0);
    if (result.pos !== tokens.length) throw new Error("Unexpected content");
    return result.value;
  }

  function formatNum(n) {
    /* Dynamic decimals: show up to 8 significant decimal digits, trim trailing zeros */
    var abs = Math.abs(n);
    var decimals = 2;
    if (abs !== 0 && abs < 0.01) decimals = 8;
    else if (abs < 1) decimals = 6;
    else if (abs < 100) decimals = 4;
    var str = n.toFixed(decimals);
    /* Trim trailing zeros but keep at least 2 decimals if there's a fraction */
    if (str.indexOf('.') !== -1) {
      str = str.replace(/0+$/, '');
      str = str.replace(/\.$/, '');
    }
    /* Add thousands separator to integer part */
    var parts = str.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    return parts.length > 1 ? parts.join('.') : parts[0];
  }

  /* ── Currency conversion ───────────────────────────────── */
  /* Strip currency symbols and whitespace, allow negative, commas, decimals */
  var currencyRe = /^([¥$€£₩₹₺฿A-Z]*\s*-?[\d,.]+)\s*([a-z]{3})\s+to\s+([a-z]{3})$/i;

  function normalizeCurrency(code) {
    code = code.toUpperCase();
    if (code === "RMB") return "CNY";
    return code;
  }

  function getSymbol(code) {
    return symbols[code] || code;
  }

  function fetchRate(from, to, cb) {
    var pair = from + to;
    var cached = rateCache[pair];
    if (cached && (Date.now() - cached.ts) < RATE_CACHE_TTL) {
      cb(cached);
      return;
    }
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/api/fx-rate?from=" + encodeURIComponent(from) + "&to=" + encodeURIComponent(to), true);
    xhr.timeout = 8000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          data.ts = Date.now();
          rateCache[pair] = data;
          cb(data);
        } catch(e) { cb(null); }
      } else {
        cb(null);
      }
    };
    xhr.onerror = xhr.ontimeout = function() { cb(null); };
    xhr.send();
  }

  /* ── History ───────────────────────────────────────────── */
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveHistory(arr) {
    localStorage.setItem(HIST_KEY, JSON.stringify(arr.slice(0, MAX_HIST)));
  }
  function addHistory(expr, result) {
    var arr = loadHistory();
    arr.unshift({ expr: expr, result: result });
    if (arr.length > MAX_HIST) arr.length = MAX_HIST;
    saveHistory(arr);
    renderHistory();
  }
  function renderHistory() {
    var arr = loadHistory();
    histList.innerHTML = "";
    arr.forEach(function(item) {
      var div = document.createElement("div");
      div.className = "calc-hist-item";
      div.innerHTML = '<span class="calc-hist-expr">' + escHtml(item.expr) +
        '</span><span class="calc-hist-val">' + escHtml(item.result) + '</span>';
      histList.appendChild(div);
    });
  }
  function escHtml(s) {
    var d = document.createElement("span");
    d.textContent = s;
    return d.innerHTML;
  }

  clearBtn.addEventListener("click", function() {
    localStorage.removeItem(HIST_KEY);
    renderHistory();
  });

  /* ── Main evaluate ─────────────────────────────────────── */
  function evaluate(raw) {
    resultEl.textContent = "";
    rateEl.textContent = "";
    sourceEl.textContent = "";
    errorEl.textContent = "";
    var expr = raw.trim();
    if (!expr) return;

    /* Currency conversion? */
    var m = expr.match(currencyRe);
    if (m) {
      var amt = parseFloat(m[1].replace(/[^0-9.\-]/g, ""));
      var from = normalizeCurrency(m[2]);
      var to = normalizeCurrency(m[3]);
      if (isNaN(amt)) { errorEl.textContent = "Invalid amount"; return; }
      if (from === to) {
        var sym = getSymbol(to);
        var display = sym + formatNum(amt);
        resultEl.textContent = display;
        rateEl.textContent = "Same currency";
        addHistory(expr, display);
        return;
      }
      fetchRate(from, to, function(data) {
        if (!data || !data.rate) { errorEl.textContent = "Could not fetch " + from + "/" + to + " rate"; return; }
        var converted = amt * data.rate;
        var sym = getSymbol(to);
        var display = sym + formatNum(converted);
        resultEl.textContent = display;
        rateEl.textContent = "Rate: 1 " + from + " = " + data.rate.toFixed(4) + " " + to;
        var src = data.source || "";
        sourceEl.textContent = sourceLabels[src] || src;
        addHistory(expr, display);
      });
      return;
    }

    /* Math expression — strip currency symbols before parsing */
    try {
      var cleanExpr = expr.replace(/[¥$€£₩₹₺฿]/g, "");
      var val = safeEval(cleanExpr);
      var display = formatNum(val);
      resultEl.textContent = display;
      addHistory(expr, display);
    } catch(e) {
      errorEl.textContent = e.message || "Invalid expression";
    }
  }

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); e.stopPropagation(); evaluate(input.value); }
  });

  /* ── Init ──────────────────────────────────────────────── */
  renderHistory();
})();
</script>
