<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Login - {{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css', v=asset_version) }}">
    <style>
      body { background: linear-gradient(180deg, #f8fafc 0%, #f3f6fb 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
      .login-card {
        background: rgba(255,255,255,0.98);
        border: 1px solid #dbe3ee;
        border-radius: 14px;
        padding: 32px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 16px 40px rgba(15,23,42,0.08);
      }
      .login-card h1 {
        font-size: 22px;
        font-weight: 700;
        color: #0f172a;
        margin: 0 0 4px;
      }
      .login-card .subtitle {
        font-size: 13px;
        color: #64748b;
        margin: 0 0 24px;
      }
      .login-field {
        margin-bottom: 16px;
      }
      .login-field label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #334155;
        margin-bottom: 6px;
      }
      .login-field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cfd8e3;
        border-radius: 10px;
        font-size: 14px;
        color: #1f2937;
        box-sizing: border-box;
      }
      .login-field input:focus {
        outline: none;
        border-color: #1d4ed8;
        box-shadow: 0 0 0 3px rgba(29,78,216,0.1);
      }
      .login-btn {
        width: 100%;
        background: #1d4ed8;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }
      .login-btn:hover { background: #1e40af; }
      .flash-msg {
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .flash-error { background: #fee2e2; color: #991b1b; }
      .flash-success { background: #d1fae5; color: #065f46; }
      @media (max-width: 480px) {
        body { padding: 16px; align-items: flex-start; padding-top: 60px; }
        .login-card { padding: 24px 20px; max-width: 100%; border-radius: 14px; }
        .login-card h1 { font-size: 20px; }
        .login-field input { padding: 12px; font-size: 16px; min-height: 48px; }
        .login-btn { padding: 14px; font-size: 16px; min-height: 48px; }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>{{ app_name }}</h1>
      <p class="subtitle">Sign in to continue</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for cat, msg in messages %}
      <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}
      <form method="POST" action="{{ url_for('login_action') }}">
        {{ csrf_input() }}
        <div class="login-field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>
  </body>
</html>
